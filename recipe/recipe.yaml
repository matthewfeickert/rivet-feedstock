schema_version: 1

context:
  version: "4.0.3"

package:
  name: rivet
  version: ${{ version }}

source:
  url: https://gitlab.com/hepcedar/rivet/-/archive/rivet-${{ version }}/rivet-rivet-${{ version }}.tar.gz
  sha256: d9ec75cd0b04de3e63cb19ff9968903f38d81629045a7573a5eddfb97e5e2904
  patches:
    - 0001-fix-Fix-Python-extension-build-for-modern-Python-3.1.patch
    - 0002-fix-Replace-shell-ls-with-make-wildcard-in-analyses-.patch
    - 0003-fix-Use-C-linker-for-libRivet-convenience-library-ag.patch
    - 0004-fix-Run-install_name_tool-on-installed-core.so-not-t.patch
    - 0005-fix-Replace-AC_CHECK_FILE-with-shell-test-for-cross-.patch

build:
  number: 0
  skip:
    - win

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - cython
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - automake
    - libtool
    - make
    - pkg-config
    - gnuconfig
    # Tools that autotools looks for
    - sed
    - grep
    - gawk
  host:
    - python
    - hepmc3 >=3.2.6,<3.3.0
    - yoda >=2.0.0
    - fastjet-contrib
    # FIXME: Determine change in FastJet API in v3.5.0+ and create patch
    - fastjet-cxx <3.5.0
    - cython
    - hdf5
    - highfive
    - zlib
  run:
    - python
    - hepmc3 >=3.2.6,<3.3.0
    - yoda >=2.0.0
    - fastjet-contrib
    # FIXME: Determine change in FastJet API in v3.5.0+ and create patch
    - fastjet-cxx <3.5.0
    - hdf5
    - highfive
    - matplotlib-base
    - requests

tests:
  - python:
      imports:
        - rivet
      pip_check: false
  - package_contents:
      strict: true
      bin:
        - make-plots
        - rivet
        - rivet-build
        - rivet-cmphistos
        - rivet-config
        - rivet-diffhepdata
        - rivet-diffhepdata-all
        - rivet-findid
        - rivet-merge
        - rivet-mkanalysis
        - rivet-mkhtml
        - rivet-mkhtml-tex
        - rivet-mkvaldir
        - rivet-which
      lib:
        - libRivet
      include:
        - Rivet/**/*
      site_packages:
        - rivet/**/*
      files:
        - lib/pkgconfig/rivet.pc
        - lib/Rivet/Rivet*Analyses.*
        - etc/bash_completion.d/rivet-completion
        - etc/conda/test-files/**/*
        - share/Rivet/**/*
  - files:
      source:
        - test/testBeams.cc
        - test/testCmp.cc
        - test/testMath.cc
        - test/testMatVec.cc
        - test/testNaN.cc
        - test/testApi.hepmc
    script:
      - rivet-config --help
      - rivet-build --help
      - rivet-which --help
      - rivet-mkhtml --help
      - rivet-mkanalysis --help
      - rivet-merge --help
      - rivet-findid --help
      - rivet-diffhepdata-all --help
      - rivet-diffhepdata --help
      - rivet-cmphistos --help
      - rivet --help
      - make-plots --help
      - rivet-mkvaldir --help

      - $CXX test/testBeams.cc -o testBeams $CXXFLAGS $LDFLAGS -lRivet
      - ./testBeams
      - $CXX test/testCmp.cc -o testCmp $CXXFLAGS $LDFLAGS -lRivet
      - ./testCmp
      - $CXX test/testMath.cc -o testMath $CXXFLAGS $LDFLAGS -lRivet
      - ./testMath
      - $CXX test/testMatVec.cc -o testMatVec $CXXFLAGS $LDFLAGS -lRivet
      - ./testMatVec
      - cd test
      - $CXX testNaN.cc -o testNaN $CXXFLAGS $LDFLAGS -lm -lHepMC3 -lRivet
      - ./testNaN testApi.hepmc

about:
  license: GPL-3.0-only
  license_file: COPYING
  summary: 'Rivet: the particle-physics MC analysis toolkit'
  description: |
    The Rivet toolkit (Robust Independent Validation of Experiment and Theory)
    is a system for validation of Monte Carlo event generators. It provides a
    large (and ever growing) set of experimental analyses useful for MC
    generator development, validation, and tuning, as well as a convenient
    infrastructure for adding your own analyses.

    Rivet is the most widespread way by which analysis code from the LHC and
    other high-energy collider experiments is preserved for comparison to and
    development of future theory models. It is used by phenomenologists, MC
    generator developers, and experimentalists on the LHC and other facilities.
  homepage: https://gitlab.com/hepcedar/rivet/
  repository: https://gitlab.com/hepcedar/rivet/
  documentation: https://rivet.hepforge.org/

extra:
  recipe-maintainers:
    - matthewfeickert
