schema_version: 1

context:
  version: "4.1.2"

package:
  name: rivet
  version: ${{ version }}

source:
  url: https://gitlab.com/hepcedar/rivet/-/archive/rivet-${{ version }}/rivet-rivet-${{ version }}.tar.gz
  sha256: ce1f8f7cc5ca63fbcfbab79abe8c2295d18d1d5e1e935027f314d69a12463517
  patches:
    - 0001-fix-Fix-Python-extension-build-for-modern-Python-3.1.patch
    - 0002-fix-Replace-shell-ls-with-make-wildcard-in-analyses-.patch
    - 0003-fix-Use-C-linker-for-libRivet-convenience-library-ag.patch
    - 0004-fix-Remove-install_name_tool-calls-and-WITH_OSX-cond.patch
    - 0005-fix-Replace-AC_CHECK_FILE-with-shell-test-for-cross-.patch
    - 0006-fix-Drop-rpath-no-from-fastjet-config-invocation.patch
    - 0007-fix-Replace-possessive-quantifiers-in-make-plots-reg.patch
    - 0008-fix-Skip-Python-import-tests-when-building-in-conda.patch

build:
  number: 0
  skip:
    - win

requirements:
  build:
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - cython
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - automake
    - libtool
    - make
    - pkg-config
    - gnuconfig
    # Tools that autotools looks for
    - sed
    - grep
    - gawk
  host:
    - python
    - hepmc3
    - yoda
    - fastjet-contrib
    - fastjet-cxx
    - cython
    - zlib
  run:
    - python
    # This can be removed when run_exports is added to yoda
    - ${{ pin_compatible('yoda', upper_bound='x.x') }}
    - matplotlib-base
    - requests

tests:
  - package_contents:
      strict: true
      bin:
        - make-plots
        - rivet
        - rivet-build
        - rivet-cmphistos
        - rivet-config
        - rivet-diffhepdata
        - rivet-diffhepdata-all
        - rivet-findid
        - rivet-merge
        - rivet-mkanalysis
        - rivet-mkhepdata
        - rivet-mkhtml
        - rivet-mkhtml-tex
        - rivet-mkvaldir
      lib:
        - libRivet
      include:
        - Rivet/**/*
      site_packages:
        - rivet/**/*
      files:
        - lib/pkgconfig/rivet.pc
        - lib/Rivet/Rivet*Analyses.*
        - etc/bash_completion.d/rivet-completion
        - etc/conda/test-files/**/*
        - share/Rivet/**/*
        - share/bash-completion/completions/rivet
        - share/zsh/site-functions/_rivet

  # Separate script section from one _with_ requirements to validate without
  # additional requirements
  - script:
      - rivet-config --help
      - rivet-build --help
      - rivet-mkhtml --help
      - rivet-mkanalysis --help
      - rivet-merge --help
      - rivet-findid --help
      - rivet-diffhepdata-all --help
      - rivet-diffhepdata --help
      - rivet-cmphistos --help
      - rivet --help
      - make-plots --help
      - rivet-mkvaldir --help

  - python:
      imports:
        - rivet
      pip_check: false

  - requirements:
      run:
        - ${{ compiler('cxx') }}
        - hepmc3
        - zlib
    files:
      source:
        - test/testBeams.cc
        - test/testCmp.cc
        - test/testMath.cc
        - test/testMatVec.cc
        - test/testNaN.cc
        - test/testAPI.hepmc
    script:
      - $CXX test/testBeams.cc -o testBeams $CXXFLAGS $LDFLAGS -lRivet
      - ./testBeams
      - $CXX test/testCmp.cc -o testCmp $CXXFLAGS $LDFLAGS -lRivet
      - ./testCmp
      - $CXX test/testMath.cc -o testMath $CXXFLAGS $LDFLAGS -lRivet
      - ./testMath
      - $CXX test/testMatVec.cc -o testMatVec $CXXFLAGS $LDFLAGS -lRivet
      - ./testMatVec
      - cd test
      - $CXX testNaN.cc -o testNaN $CXXFLAGS $LDFLAGS -lm -lz -lHepMC3 -lYODA -lRivet
      - ./testNaN testAPI.hepmc

about:
  license: GPL-3.0-only
  license_file: COPYING
  summary: 'Rivet: the particle-physics MC analysis toolkit'
  description: |
    The Rivet toolkit (Robust Independent Validation of Experiment and Theory)
    is a system for validation of Monte Carlo event generators. It provides a
    large (and ever growing) set of experimental analyses useful for MC
    generator development, validation, and tuning, as well as a convenient
    infrastructure for adding your own analyses.

    Rivet is the most widespread way by which analysis code from the LHC and
    other high-energy collider experiments is preserved for comparison to and
    development of future theory models. It is used by phenomenologists, MC
    generator developers, and experimentalists on the LHC and other facilities.
  homepage: https://gitlab.com/hepcedar/rivet/
  repository: https://gitlab.com/hepcedar/rivet/
  documentation: https://rivet.hepforge.org/

extra:
  recipe-maintainers:
    - matthewfeickert
